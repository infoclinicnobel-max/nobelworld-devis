      <thead><tr><th>Option</th><th className="r" style={{textAlign:'right'}}>Prix</th><th></th></tr></thead>
      <tbody>{data.options.map(o=><tr key={o.id}><td className="t-strong">{o.nom}</td>
        <td className="tnum" style={{textAlign:'right'}}>{money(o.prix,cur)}</td>
        <td style={{textAlign:'right'}}>{admin&&<><button className="btn btn-ghost btn-sm" onClick={()=>setEdit(o)}><Ico.edit size={14}/></button>
          <button className="btn btn-ghost btn-sm btn-danger" onClick={async()=>{await remove('options',o.id);toast('Option supprimée','err');}}><Ico.trash size={14}/></button></>}</td></tr>)}</tbody></table></div>
    {edit&&<Modal small title={edit.id?'Modifier l\'option':'Nouvelle option'} onClose={()=>setEdit(null)}
      footer={<><button className="btn" onClick={()=>setEdit(null)}>Annuler</button>
        <button className="btn btn-primary" onClick={async()=>{await save('options',edit);toast('Option enregistrée');setEdit(null);}}><Ico.check size={16}/>Enregistrer</button></>}>
      <Field label="Nom"><Input value={edit.nom||''} onChange={e=>setEdit({...edit,nom:e.target.value})}/></Field>
      <Field label="Prix"><Input type="number" value={edit.prix||0} onChange={e=>setEdit({...edit,prix:Number(e.target.value)})}/></Field>
    </Modal>}
  </>;
}

/* =========================================================================
   HISTORIQUE
   ------------------------------------------------------------------------- */
function HistoriqueView(){
  const {data}=useApp();
  const list=[...(data.historique||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const groups={};
  list.forEach(h=>{ const d=fmtDate(h.date); (groups[d]=groups[d]||[]).push(h); });
  return <div className="card card-pad">
    <div className="sec-head"><div><h2>Historique</h2><div className="desc">Toutes les actions de l'équipe</div></div></div>
    {list.length? Object.entries(groups).map(([day,items])=><div key={day} style={{marginBottom:18}}>
      <div className="muted" style={{fontSize:12,fontWeight:600,margin:'0 0 8px'}}>{day}</div>
      {items.map(h=><div key={h.id} style={{display:'flex',gap:12,padding:'8px 0',borderLeft:'2px solid var(--line)',paddingLeft:14,marginLeft:4}}>
        <span className="tnum muted" style={{fontSize:12,minWidth:46}}>{new Date(h.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>
        <span style={{fontSize:13.5}}><b>{h.user}</b> {h.message}</span></div>)}
    </div>) : <Empty icon={Ico.hist} title="Aucune action" sub="L'historique se remplira au fil de l'activité."/>}
  </div>;
}
/* =========================================================================
   PARAMÈTRES
   ------------------------------------------------------------------------- */
function ParametresView(){
  const {data,user,saveSettings,toast,resetPassword}=useApp();
  const [s,setS]=useState({...DEFAULT_SETTINGS,...data.parametres});
  const [tab,setTab]=useState('societe');
  const [pwd,setPwd]=useState({email:user.email,np:'',np2:''});
  const set=(k,v)=>setS(x=>({...x,[k]:v}));
  const admin=can(user,'all');
  const importLogo=(e)=>{ const file=e.target.files?.[0]; if(!file) return;
    const r=new FileReader(); r.onload=()=>set('logo',r.result); r.readAsDataURL(file); };

  return <div style={{maxWidth:760}}>
    <div className="seg" style={{marginBottom:18}}>
      {[['societe','Société'],['banque','Paiement & légal'],['connexion','Connexion'],['securite','Sécurité']].map(([k,l])=>(
        <button key={k} className={tab===k?'on':''} onClick={()=>setTab(k)}>{l}</button>))}</div>

    {tab==='societe'&&<div className="card card-pad">
      <Field label="Logo" hint="apparaît sur tous les documents">
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div style={{width:120,height:64,border:'1px dashed var(--line)',borderRadius:10,display:'grid',placeItems:'center',background:'var(--surface)',overflow:'hidden'}}>
            {s.logo? <img src={s.logo} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}}/> : <span className="muted" style={{fontSize:11}}>Aucun logo</span>}</div>
          <label className="btn"><Ico.plus size={15}/>Importer<input type="file" accept="image/*" hidden onChange={importLogo}/></label>
          {s.logo&&<button className="btn btn-ghost btn-sm btn-danger" onClick={()=>set('logo','')}>Retirer</button>}</div></Field>
      <div className="row2"><Field label="Nom de la société"><Input value={s.company} onChange={e=>set('company',e.target.value)}/></Field>
        <Field label="Slogan"><Input value={s.tagline} onChange={e=>set('tagline',e.target.value)}/></Field></div>
      <Field label="Titre du document" hint="affiché en haut du devis"><Input value={s.docTitle||''} placeholder="DEVIS MÉDICAL PREMIUM" onChange={e=>set('docTitle',e.target.value)}/></Field>
      <Field label="Adresse"><Input value={s.address} onChange={e=>set('address',e.target.value)}/></Field>
      <div className="row2"><Field label="Téléphone"><Input value={s.phone} onChange={e=>set('phone',e.target.value)}/></Field>
        <Field label="WhatsApp"><Input value={s.whatsapp} onChange={e=>set('whatsapp',e.target.value)}/></Field></div>
      <div className="row2"><Field label="Email"><Input value={s.email} onChange={e=>set('email',e.target.value)}/></Field>
        <Field label="Site internet"><Input value={s.website} onChange={e=>set('website',e.target.value)}/></Field></div>
    </div>}

    {tab==='banque'&&<div className="card card-pad">
      <div className="row2"><Field label="IBAN"><Input value={s.iban} onChange={e=>set('iban',e.target.value)}/></Field>
        <Field label="BIC"><Input value={s.bic} onChange={e=>set('bic',e.target.value)}/></Field></div>
      <div className="row2"><Field label="N° TVA" hint="(optionnel)"><Input value={s.vat} onChange={e=>set('vat',e.target.value)}/></Field>
        <Field label="Devise"><Select value={s.currency} onChange={e=>set('currency',e.target.value)}>{['€','$','£','₺'].map(c=><option key={c}>{c}</option>)}</Select></Field></div>
      <Field label="Conditions générales / paiement"><Textarea style={{minHeight:90}} value={s.cgv} onChange={e=>set('cgv',e.target.value)}/></Field>
      <Field label="Conditions importantes" hint="bloc encadré sur le document"><Textarea style={{minHeight:90}} value={s.important||''} onChange={e=>set('important',e.target.value)}/></Field>
      <Field label="Mentions légales (pied de page)"><Textarea value={s.legal} onChange={e=>set('legal',e.target.value)}/></Field>
    </div>}

    {tab==='connexion'&&<div className="card card-pad">
      <h2 style={{fontSize:15,marginTop:0}}>Synchronisation Google Sheets</h2>
      <p className="muted" style={{fontSize:13,lineHeight:1.6}}>
        L'application fonctionne en <b>mode local</b> tant qu'aucune URL n'est renseignée. Pour activer la synchro temps réel entre Veys, Andréa et Ceyda, déployez le script <b>Code.gs</b> (fourni) en tant que Web App, puis collez l'URL ci-dessous dans le fichier <code>devis.html</code> (variable <code>CONFIG.APPS_SCRIPT_URL</code>).</p>
      <div className="card card-pad" style={{background:'var(--surface)',fontSize:13,lineHeight:1.7}}>
        <b>État actuel :</b> {API.remote()
          ? <span className="badge b-paid" style={{marginLeft:6}}><span className="dot"></span>Connecté à Google Sheets</span>
          : <span className="badge b-wait" style={{marginLeft:6}}><span className="dot"></span>Mode local</span>}
      </div>
      <p className="muted" style={{fontSize:12.5,marginTop:14}}>Synchronisation automatique toutes les {CONFIG.POLL_MS/1000} s.</p>
    </div>}

    {tab==='securite'&&<div className="card card-pad">
      <h2 style={{fontSize:15,marginTop:0}}>Changer un mot de passe</h2>
      {admin? <Select value={pwd.email} onChange={e=>setPwd({...pwd,email:e.target.value})} style={{marginBottom:12}}>
        {data.utilisateurs.map(u=><option key={u.id} value={u.email}>{userLabel(u)} ({u.email})</option>)}</Select>
        : <p className="muted" style={{fontSize:13}}>Vous modifiez votre propre mot de passe ({user.email}).</p>}
      <div className="row2"><Field label="Nouveau mot de passe"><Input type="password" value={pwd.np} onChange={e=>setPwd({...pwd,np:e.target.value})}/></Field>
        <Field label="Confirmer"><Input type="password" value={pwd.np2} onChange={e=>setPwd({...pwd,np2:e.target.value})}/></Field></div>
      <button className="btn btn-primary" disabled={!pwd.np||pwd.np!==pwd.np2}
        onClick={async()=>{ try{ await resetPassword(pwd.email,pwd.np); toast('Mot de passe mis à jour'); setPwd({...pwd,np:'',np2:''}); }catch(e){ toast(e.message||'Erreur','err'); } }}>
        <Ico.check size={16}/>Mettre à jour</button>
      <p className="muted" style={{fontSize:12,marginTop:14,lineHeight:1.6}}>Pensez à changer les mots de passe par défaut dès la première utilisation.</p>
    </div>}

    {tab!=='connexion'&&tab!=='securite'&&<div style={{marginTop:16}}>
      <button className="btn btn-primary" onClick={async()=>{ await saveSettings(s); toast('Paramètres enregistrés'); }}>
        <Ico.check size={16}/>Enregistrer les paramètres</button></div>}
  </div>;
}

/* =========================================================================
   GESTION DES UTILISATEURS (admin)
   ------------------------------------------------------------------------- */
function UtilisateursView(){
  const {data,user,saveUser,removeUser,toast,log}=useApp();
  const [form,setForm]=useState(null);
  const [reset,setReset]=useState(null);
  const [del,setDel]=useState(null);
  if(!isAdmin(user)) return <Empty icon={Ico.users} title="Accès réservé" sub="Seul l'administrateur peut gérer les utilisateurs."/>;
  const users=data.utilisateurs||[];
  const toggleStatut=async(u)=>{ const statut=u.statut==='desactive'?'actif':'desactive';
    try{ await saveUser({...u,statut}); toast(statut==='actif'?'Compte activé':'Compte désactivé');
      log(`a ${statut==='actif'?'activé':'désactivé'} le compte ${userLabel(u)}`);
    }catch(e){ toast(e.message||'Erreur','err'); } };
  return <>
    <div className="toolbar"><div className="sec-head" style={{margin:0}}><div><h2>Utilisateurs</h2>
      <div className="desc">{users.length} compte(s)</div></div></div><div className="sp"/>
      <button className="btn btn-primary" onClick={()=>setForm({})}><Ico.plus size={16}/>Nouvel utilisateur</button></div>
    <div className="card">{users.length? <table>
      <thead><tr><th>Utilisateur</th><th>Rôle</th><th>Fonction</th><th>Statut</th><th>Dernière connexion</th><th></th></tr></thead>
      <tbody>{users.map(u=>(
        <tr key={u.id}>
          <td><div style={{display:'flex',alignItems:'center',gap:10}}>
            {u.photo? <img src={u.photo} className="uav"/> : <div className="uav ph">{initials(userLabel(u))}</div>}
            <div style={{minWidth:0}}><div className="t-strong">{userLabel(u)}</div><div className="muted" style={{fontSize:12}}>{u.email}</div></div></div></td>
          <td>{ROLES[u.role]?.label||u.role}</td>
          <td className="muted">{u.fonction||'—'}</td>
          <td>{u.statut==='desactive'? <span className="badge b-cancel"><span className="dot"/>Désactivé</span> : <span className="badge b-paid"><span className="dot"/>Actif</span>}</td>
          <td className="muted">{u.lastLogin?fmtDateTime(u.lastLogin):'Jamais'}</td>
          <td style={{textAlign:'right',whiteSpace:'nowrap'}}>
            <button className="btn btn-ghost btn-sm" title="Modifier" onClick={()=>setForm(u)}><Ico.edit size={15}/></button>
            <button className="btn btn-ghost btn-sm" title="Mot de passe" onClick={()=>setReset(u)}><Ico.lock size={15}/></button>
            <button className="btn btn-ghost btn-sm" title={u.statut==='desactive'?'Activer':'Désactiver'} onClick={()=>toggleStatut(u)}><Ico.power size={15}/></button>
            {u.id!==user.id&&<button className="btn btn-ghost btn-sm btn-danger" title="Supprimer" onClick={()=>setDel(u)}><Ico.trash size={15}/></button>}
          </td></tr>))}</tbody></table>
      : <Empty icon={Ico.users} title="Aucun utilisateur" sub="Ajoutez les membres de votre équipe."
          action={<button className="btn btn-primary" onClick={()=>setForm({})}><Ico.plus size={16}/>Nouvel utilisateur</button>}/>}</div>
    {form&&<UserForm draft={form} onClose={()=>setForm(null)}/>}
    {reset&&<ResetPwd u={reset} onClose={()=>setReset(null)}/>}
    {del&&<Confirm danger title="Supprimer l'utilisateur" message={`Supprimer définitivement ${userLabel(del)} ? Cette action est irréversible.`} yes="Supprimer"
      onClose={()=>setDel(null)} onYes={async()=>{ try{ await removeUser(del.id); toast('Utilisateur supprimé','err'); log(`a supprimé l'utilisateur ${userLabel(del)}`);}catch(e){ toast(e.message||'Erreur','err'); } }}/>}
  </>;
}

function UserForm({draft,onClose}){
  const {saveUser,toast,log,user:me}=useApp();
  const isEdit=!!draft.id; const isSelf=isEdit&&draft.id===me.id;
  const [f,setF]=useState({prenom:'',nom:'',email:'',telephone:'',fonction:'',role:'commerciale',statut:'actif',photo:'',password:'',...draft});
  const [perms,setPerms]=useState(()=> (draft.perms&&Object.keys(draft.perms).length)?{...draft.perms}:roleDefaultPerms(draft.role||'commerciale'));
  const [showPerms,setShowPerms]=useState(false);
  const [busy,setBusy]=useState(false); const [err,setErr]=useState('');
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const changeRole=(role)=>{ set('role',role); setPerms(roleDefaultPerms(role)); };
  const onPhoto=async(e)=>{ const file=e.target.files?.[0]; if(!file) return; try{ set('photo',await resizeImage(file)); }catch(_){} };
  const save=async()=>{ setErr('');
    if(!f.email) return setErr('Email requis.');
    if(!isEdit&&!f.password) return setErr('Mot de passe requis pour un nouvel utilisateur.');
    if(f.password&&f.password.length<6) return setErr('Mot de passe : 6 caractères minimum.');
    setBusy(true);
    try{
      const payload={id:f.id,prenom:f.prenom,nom:f.nom,email:f.email,telephone:f.telephone,fonction:f.fonction,
        role:f.role,statut:f.statut,photo:f.photo,perms:f.role==='pdg'?{}:perms};
      if(f.password) payload.password=f.password;
      await saveUser(payload);
      toast(isEdit?'Utilisateur mis à jour':'Utilisateur créé');
      log(`${isEdit?'a modifié':'a créé'} l'utilisateur ${userLabel(f)}`);
      onClose();
    }catch(e){ setErr(e.message||'Erreur'); } finally{ setBusy(false); }
  };
  return <Drawer title={isEdit?"Modifier l'utilisateur":'Nouvel utilisateur'} onClose={onClose}
    footer={<><button className="btn" onClick={onClose}>Annuler</button>
      <button className="btn btn-primary" disabled={busy} onClick={save}>{busy?<span className="spin"/>:<><Ico.check size={16}/>Enregistrer</>}</button></>}>
    <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:8}}>
      {f.photo? <img src={f.photo} className="uav lg"/> : <div className="uav lg ph">{initials(userLabel(f)||'?')}</div>}
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <label className="btn btn-sm"><Ico.plus size={14}/>Photo<input type="file" accept="image/*" hidden onChange={onPhoto}/></label>
        {f.photo&&<button className="btn btn-ghost btn-sm btn-danger" onClick={()=>set('photo','')}>Retirer</button>}</div>
    </div>
    <div className="row2"><Field label="Prénom"><Input value={f.prenom} onChange={e=>set('prenom',e.target.value)}/></Field>
      <Field label="Nom"><Input value={f.nom} onChange={e=>set('nom',e.target.value)}/></Field></div>
    <Field label="Fonction" hint="(ex. Commerciale, Coordinatrice)"><Input value={f.fonction} onChange={e=>set('fonction',e.target.value)}/></Field>
    <div className="row2"><Field label="Email (identifiant)"><Input type="email" value={f.email} onChange={e=>set('email',e.target.value)}/></Field>
      <Field label="Téléphone"><Input value={f.telephone} onChange={e=>set('telephone',e.target.value)}/></Field></div>
    <div className="row2">
      <Field label="Rôle" hint={isSelf?'(non modifiable sur soi)':''}><Select value={f.role} onChange={e=>changeRole(e.target.value)} disabled={isSelf}>
        {Object.entries(ROLES).map(([k,r])=><option key={k} value={k}>{r.label}</option>)}</Select></Field>
      <Field label="Statut" hint={isSelf?'(non modifiable sur soi)':''}><Select value={f.statut} onChange={e=>set('statut',e.target.value)} disabled={isSelf}>
        <option value="actif">Actif</option><option value="desactive">Désactivé</option></Select></Field></div>
    <Field label={isEdit?'Nouveau mot de passe':'Mot de passe'} hint={isEdit?'(laisser vide pour ne pas changer)':'(6 caractères min.)'}>
      <Input type="password" value={f.password} placeholder={isEdit?'••••••••':''} onChange={e=>set('password',e.target.value)}/></Field>
    {f.role!=='pdg'? <div className="card card-pad" style={{marginTop:4}}>
      <button className="btn btn-ghost btn-sm" onClick={()=>setShowPerms(v=>!v)}><Ico.cog size={15}/>{showPerms?'Masquer les permissions':'Permissions détaillées'}</button>
      {showPerms&&<div style={{marginTop:12}}>{PERMS.map(grp=><div key={grp.g} style={{marginBottom:12}}>
        <div className="muted" style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>{grp.g}</div>
        {grp.items.map(([k,lbl])=><label key={k} className="permrow">
          <input type="checkbox" checked={!!perms[k]} onChange={e=>setPerms(p=>({...p,[k]:e.target.checked}))}/>{lbl}</label>)}
      </div>)}</div>}
    </div>
    : <p className="muted" style={{fontSize:12.5,marginTop:4}}>Le rôle <b>PDG / Administrateur</b> dispose d'un accès complet à toutes les fonctions.</p>}
    {err&&<div style={{color:'var(--bad)',fontSize:13,marginTop:10,fontWeight:500}}>{err}</div>}
  </Drawer>;
}

function ResetPwd({u,onClose}){
  const {resetPassword,toast,log}=useApp();
  const [np,setNp]=useState(''); const [np2,setNp2]=useState(''); const [busy,setBusy]=useState(false); const [err,setErr]=useState('');
  const go=async()=>{ setErr('');
    if(np.length<6) return setErr('6 caractères minimum.');
    if(np!==np2) return setErr('Les mots de passe ne correspondent pas.');
    setBusy(true);
    try{ await resetPassword(u.email,np); toast('Mot de passe réinitialisé'); log(`a réinitialisé le mot de passe de ${userLabel(u)}`); onClose(); }
    catch(e){ setErr(e.message||'Erreur'); } finally{ setBusy(false); } };
  return <Modal small title={'Mot de passe — '+userLabel(u)} onClose={onClose}
    footer={<><button className="btn" onClick={onClose}>Annuler</button>
      <button className="btn btn-primary" disabled={busy} onClick={go}>{busy?<span className="spin"/>:'Réinitialiser'}</button></>}>
    <div className="row2"><Field label="Nouveau mot de passe"><Input type="password" value={np} autoFocus onChange={e=>setNp(e.target.value)}/></Field>
      <Field label="Confirmer"><Input type="password" value={np2} onChange={e=>setNp2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/></Field></div>
    {err&&<div style={{color:'var(--bad)',fontSize:13,fontWeight:500}}>{err}</div>}
  </Modal>;
}

   RENDU
   ------------------------------------------------------------------------- */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
