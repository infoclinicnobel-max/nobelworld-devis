<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Clinic NobelWorld — Devis &amp; Factures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Spectral:wght@500;600;700&display=swap" rel="stylesheet">
<script>
/* Chargeur robuste : cdnjs (Cloudflare) en priorité, puis replis automatiques.
   Évite le blocage sur "Chargement…" si un CDN est inaccessible sur le réseau. */
(function(){
  var libs=[
    {g:'React',  u:['https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
                    'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js',
                    'https://unpkg.com/react@18/umd/react.production.min.js']},
    {g:'ReactDOM',u:['https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
                    'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js',
                    'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js']},
    {g:'Babel',  u:['https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js',
                    'https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js',
                    'https://unpkg.com/@babel/standalone@7/babel.min.js']}
  ];
  function loadOne(lib,done){
    var i=0;
    (function attempt(){
      if(window[lib.g]) return done(true);
      if(i>=lib.u.length) return done(false);
      var s=document.createElement('script');
      s.src=lib.u[i++];
      s.onload=function(){ done(true); };
      s.onerror=attempt;
      document.head.appendChild(s);
    })();
  }
  function chain(k){
    if(k>=libs.length){ start(); return; }
    loadOne(libs[k],function(ok){
      if(!ok){ fail(libs[k].g); return; }
      chain(k+1);
    });
  }
  function start(){
    function go(){ try{ Babel.transformScriptTags(); }catch(e){ fail('Babel',e); } }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',go);
    else go();
  }
  function fail(name,e){
    console.error('Chargement impossible :',name,e||'');
    var r=document.getElementById('root');
    if(r) r.innerHTML='<div style="min-height:100vh;display:grid;place-items:center;text-align:center;font-family:sans-serif;color:#0F1B2D;padding:24px">'+
      '<div><div style="font-weight:700;font-size:18px;margin-bottom:8px">Impossible de charger l\'application</div>'+
      '<div style="color:#5B6B7F;max-width:420px;line-height:1.6">Le réseau bloque les bibliothèques nécessaires ('+name+'). '+
      'Essayez un autre réseau (ex. partage de connexion mobile) ou réessayez dans un instant.</div></div></div>';
  }
  chain(0);
})();
</script>
<style>
:root{
  --ink:#0F1B2D; --blue:#1C6CB0; --blue-deep:#0E3A5C; --gold:#C9A25A;
  --paper:#FFFFFF; --surface:#F5F7FA; --surface-2:#EEF2F7; --line:#E4E9F0;
  --muted:#5B6B7F; --muted-2:#8593A4; --ok:#1B9E6B; --warn:#C9892B; --bad:#C0492F;
  --radius:14px; --radius-sm:10px; --shadow:0 1px 2px rgba(15,27,45,.04),0 8px 24px rgba(15,27,45,.06);
  --shadow-lg:0 12px 40px rgba(15,27,45,.14);
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --serif:'Spectral',Georgia,serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--surface);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--blue);text-decoration:none}
::selection{background:rgba(28,108,176,.18)}
.tnum{font-variant-numeric:tabular-nums}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;color:var(--ink);
  padding:9px 14px;border-radius:var(--radius-sm);font-weight:600;font-size:13.5px;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--surface);border-color:#d3dbe6}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:#175c97;border-color:#175c97}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--surface-2)}
.btn-danger{color:var(--bad);border-color:#f0d4cd}
.btn-danger:hover{background:#fdf1ee}
.btn-sm{padding:6px 10px;font-size:12.5px}
.btn[disabled]{opacity:.5;pointer-events:none}

/* ---------- Layout ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;flex:0 0 248px;background:var(--ink);color:#cdd7e4;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;padding:18px 14px;gap:4px}
.brand{display:flex;align-items:center;gap:11px;padding:8px 8px 16px;margin-bottom:6px}
.brand .mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(150deg,var(--blue),var(--blue-deep));
  display:grid;place-items:center;color:#fff;font-family:var(--serif);font-weight:700;font-size:19px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
.brand .name{font-family:var(--serif);font-weight:600;font-size:16px;color:#fff;line-height:1.1}
.brand .sub{font-size:11px;color:#7f93ab;letter-spacing:.04em;text-transform:uppercase}
.nav-section{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:#637a96;margin:14px 10px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:#aebed1;font-weight:500;font-size:13.5px;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:linear-gradient(120deg,rgba(28,108,176,.32),rgba(28,108,176,.12));color:#fff;box-shadow:inset 0 0 0 1px rgba(28,108,176,.35)}
.nav-item .ic{width:18px;height:18px;flex:0 0 18px;opacity:.9}
.nav-spacer{flex:1}
.nav-user{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:rgba(255,255,255,.04);margin-top:8px}
.nav-user .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(140deg,var(--gold),#9c7a35);display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px}
.nav-user .nm{font-size:13px;color:#fff;font-weight:600;line-height:1.1}
.nav-user .rl{font-size:11px;color:#8ba0b8}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:62px;display:flex;align-items:center;gap:14px;padding:0 26px;background:rgba(255,255,255,.86);
  backdrop-filter:saturate(180%) blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.topbar h1{font-size:18px;font-weight:600;margin:0;letter-spacing:-.01em}
.nav-arrow{flex:0 0 auto;padding:6px 8px}
.topbar .btn[disabled]{opacity:.34;cursor:not-allowed}
.search{flex:1;max-width:420px;position:relative}
.search input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--line);border-radius:10px;background:var(--surface);outline:none}
.search input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(28,108,176,.1)}
.search .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted-2)}
.content{padding:26px;max-width:1280px;width:100%;margin:0 auto}

/* ---------- Cards / tables ---------- */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:20px}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .lab{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:7px}
.kpi .val{font-size:25px;font-weight:700;margin-top:7px;letter-spacing:-.02em}
.kpi .sub{font-size:12px;color:var(--muted-2);margin-top:2px}
.kpi .edge{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue)}
.kpi.gold .edge{background:var(--gold)} .kpi.ok .edge{background:var(--ok)} .kpi.warn .edge{background:var(--warn)}

.sec-head{display:flex;align-items:center;justify-content:space-between;margin:4px 0 14px}
.sec-head h2{font-size:16px;font-weight:600;margin:0}
.sec-head .desc{font-size:12.5px;color:var(--muted)}

table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:13px 14px;border-bottom:1px solid var(--surface-2);font-size:13.5px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr.clickable:hover{background:var(--surface);cursor:pointer}
.t-strong{font-weight:600}
.muted{color:var(--muted)}

/* ---------- Badges ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600;border:1px solid transparent}
.badge .dot{width:6px;height:6px;border-radius:50%}
.b-wait{background:#fff7ec;color:#9a6a16;border-color:#f3e2c4} .b-wait .dot{background:var(--warn)}
.b-part{background:#eef4fb;color:#1a5894;border-color:#cfe0f1} .b-part .dot{background:var(--blue)}
.b-paid{background:#ecf8f2;color:#157a52;border-color:#c8ecda} .b-paid .dot{background:var(--ok)}
.b-cancel{background:#fbeeeb;color:#a23a23;border-color:#f0d2ca} .b-cancel .dot{background:var(--bad)}
.b-draft{background:var(--surface-2);color:var(--muted);border-color:var(--line)} .b-draft .dot{background:var(--muted-2)}

/* ---------- Forms ---------- */
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:6px}
.field .hint{font-size:11.5px;color:var(--muted-2);font-weight:400;margin-left:4px}
.input,select.input,textarea.input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;outline:none;transition:.15s;color:var(--ink)}
.input:focus,textarea.input:focus,select.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(28,108,176,.1)}
textarea.input{resize:vertical;min-height:74px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ---------- Modal / drawer ---------- */
.overlay{position:fixed;inset:0;background:rgba(15,27,45,.42);backdrop-filter:blur(2px);z-index:60;display:flex;justify-content:flex-end;animation:fade .18s}
.drawer{width:min(720px,100%);background:#fff;height:100%;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slide .22s cubic-bezier(.2,.8,.2,1)}
.modal-center{align-items:center;justify-content:center}
.modal{width:min(560px,94%);background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);animation:pop .18s;max-height:90vh;overflow:auto}
.drawer-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;z-index:2}
.drawer-head h3{margin:0;font-size:17px;font-weight:600}
.drawer-body{padding:22px}
.drawer-foot{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:14px 22px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;row-gap:10px}
.docnav{display:flex;align-items:center;gap:6px;margin-right:auto}
.docnav-c{font-size:12.5px;color:var(--muted);font-weight:600;min-width:90px;text-align:center;white-space:nowrap}
.docnav .btn[disabled]{opacity:.36;cursor:not-allowed}
@keyframes fade{from{opacity:0}} @keyframes slide{from{transform:translateX(30px);opacity:.6}}
@keyframes pop{from{transform:scale(.97);opacity:0}}

/* ---------- Steps ---------- */
.steps{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:99px;background:var(--surface);color:var(--muted);font-size:12.5px;font-weight:600;border:1px solid var(--line)}
.step.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.step.done{background:#eaf3ec;color:var(--ok);border-color:#cfe9d8}
.step .n{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.25);display:grid;place-items:center;font-size:11px}

/* ---------- Toast / empty ---------- */
.toasts{position:fixed;bottom:22px;right:22px;z-index:90;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:11px;box-shadow:var(--shadow-lg);font-size:13.5px;display:flex;align-items:center;gap:10px;animation:pop .2s;max-width:340px}
.toast .bar{width:3px;align-self:stretch;border-radius:2px;background:var(--blue)}
.toast.ok .bar{background:var(--ok)} .toast.err .bar{background:var(--bad)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ic{width:46px;height:46px;color:var(--muted-2);margin-bottom:12px}
.empty h3{margin:0 0 5px;color:var(--ink);font-weight:600}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.toolbar .sp{flex:1}
.seg{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:3px}
.seg button{border:none;background:transparent;padding:6px 12px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;background:var(--surface);border:1px solid var(--line);font-size:12.5px;font-weight:500}
.chip button{border:none;background:transparent;color:var(--muted-2);padding:0;display:grid;place-items:center}

/* ---------- Login ---------- */
.login{min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr}
.login .left{background:linear-gradient(155deg,var(--blue-deep),var(--ink));color:#fff;padding:54px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.login .left::after{content:"";position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(28,108,176,.5),transparent 70%);right:-120px;top:-80px}
.login .left::before{content:"";position:absolute;width:1px;height:60%;background:linear-gradient(var(--gold),transparent);left:54px;bottom:0;opacity:.4}
.login .lmark{display:flex;align-items:center;gap:13px;position:relative;z-index:2}
.login .lmark .mk{width:46px;height:46px;border-radius:12px;background:linear-gradient(150deg,var(--blue),var(--blue-deep));display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:22px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
.login .hero{position:relative;z-index:2}
.login .hero h2{font-family:var(--serif);font-size:34px;font-weight:600;line-height:1.18;margin:0 0 14px;letter-spacing:-.01em}
.login .hero p{color:#b3c4d8;font-size:15px;max-width:380px;line-height:1.6}
.login .feat{display:flex;gap:22px;position:relative;z-index:2;color:#9fb3cb;font-size:13px}
.login .right{display:grid;place-items:center;padding:40px;background:#fff}
.login .form{width:min(360px,100%)}
.login .form h3{font-size:22px;font-weight:600;margin:0 0 5px}
.login .form .lead{color:var(--muted);margin:0 0 26px}

@media (max-width:980px){
  .login{grid-template-columns:1fr} .login .left{display:none}
  .sidebar{position:fixed;left:0;top:0;z-index:80;transform:translateX(-100%);transition:.22s;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:none}
  .row2,.row3{grid-template-columns:1fr}
  .content{padding:18px}
  .menu-btn{display:inline-grid !important}
  .editor-top{flex:0 0 auto;height:auto;min-height:56px;flex-wrap:wrap;row-gap:8px;padding:8px 12px}
  .editor-top h3{flex:1 1 130px;font-size:14px}
  .editor-nav{order:3;flex:1 1 100%;justify-content:center}
  .editor-main{flex-direction:column}
  .editor-side{width:100%;flex:0 0 auto;border-left:none;border-top:1px solid var(--line)}
  .editor-doc{padding:12px}
  .doc{width:100% !important;min-width:0;min-height:auto}
  .doc .dhead{padding:24px 20px 16px;flex-wrap:wrap;gap:14px}
  .doc .drule{margin:0 20px}
  .doc .dbody{padding:18px 20px 64px}
  .doc .pinfo{grid-template-columns:1fr}
  .doc .parties{flex-direction:column;gap:16px}
  .doc .parties>div{text-align:left !important}
  .doc .twocol{flex-direction:column;gap:18px}
  .doc .docfoot{position:static;margin-top:24px}
}
.menu-btn{display:none;place-items:center;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:#fff}
.scrim{display:none;position:fixed;inset:0;background:rgba(15,27,45,.4);z-index:70}
.scrim.show{display:block}

/* ---------- Document / PDF (premium clair) ---------- */
.doc-wrap{background:#aeb9c6;padding:28px;border-radius:var(--radius);overflow:auto}
.doc{width:794px;margin:0 auto;display:flex;flex-direction:column;gap:22px;font-size:13px;line-height:1.55;color:#26303f;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.doc .page{position:relative;display:flex;flex-direction:column;min-height:1123px;background:#fff;box-shadow:0 14px 50px rgba(0,0,0,.22)}
.doc .pagefoot{display:flex;justify-content:space-between;align-items:center;padding:12px 28px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted-2);letter-spacing:.02em}
.doc .cont{display:flex;justify-content:space-between;align-items:baseline;padding:22px 28px 14px;border-bottom:1px solid var(--line)}
.doc .cont .cnm{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--ink)}
.doc .cont .cno{font-size:11px;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;font-weight:700}
.doc .endblock{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;padding:18px 28px;color:var(--muted-2);font-size:10.5px;line-height:1.55}
.doc .endblock .qr{width:66px;height:66px;opacity:.92;flex:0 0 auto}
.doc .notesbox{background:#f7f9fb;border:1px solid var(--line);border-radius:11px;padding:16px 20px;font-size:13px;line-height:2;color:var(--muted);white-space:pre-wrap}
.doc .dbody2{padding-top:22px}
.doc .dhead{display:flex;justify-content:space-between;align-items:flex-start;padding:38px 28px 18px;gap:26px}
.doc .dhead.center{display:block;text-align:center;padding:30px 28px 0}
.doc .dhead.center .cnlogo{display:block;margin:0 auto 20px}
.doc .brand{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:.14em;color:var(--ink)}
.doc .brandsub{font-size:13px;color:var(--blue);letter-spacing:.16em;text-transform:uppercase;margin-top:6px}
.doc .brandloc{font-size:12.5px;color:var(--muted);letter-spacing:.08em;margin-top:4px}
.doc .brandcoord{font-size:13px;color:var(--muted);margin-top:11px;letter-spacing:.01em}
.doc .hsep{height:1px;background:#D9D9D9;width:100%;margin:18px 0 0}
.doc .metarow{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding:18px 28px 0}
.doc .metarow .adv{margin-top:0}
.doc .docmeta{text-align:right;flex:0 0 auto}
.doc .docmeta .ty{font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);font-weight:700}
.doc .docmeta .no{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--ink);margin-top:6px}
.doc .docmeta .dt{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.85}
.doc .docmeta .dt b{color:var(--ink)}
.doc .loghead{text-align:center;padding:24px 28px 14px;border-bottom:1px solid var(--line)}
.doc .loghead .cnlogo{display:block;margin:0 auto 8px}
.doc .loghead .suite{font-size:11px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.doc .dhead .co .logo{height:120px;width:auto;max-width:340px;object-fit:contain;display:block;margin-bottom:14px}
.doc .dhead .co .nm{font-family:var(--serif);font-size:23px;font-weight:700;color:var(--ink);letter-spacing:.01em}
.doc .dhead .co .tag{font-size:11.5px;color:var(--blue);letter-spacing:.03em;line-height:1.5;margin-top:6px}
.doc .dhead .co .ad{font-size:13px;color:var(--muted);margin-top:12px;line-height:1.8}
.doc .dhead .co .adv{margin-top:14px;padding:11px 15px;border-left:3px solid var(--gold);background:#fafbfc;border-radius:0 8px 8px 0;line-height:1.6;max-width:320px}
.doc .dhead .co .adv .advt{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);font-weight:700;margin-bottom:4px}

const uid = (p='id') => p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);

const addDays = (iso,n) => { const d=new Date(iso); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };

// Évite le bug Google Sheets « 1899 » sur dates/heures
function normalizeDate(v){
  if(!v) return "";
  if(typeof v==='string' && /^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0,10);
  const d=new Date(v); return isNaN(d)? String(v): d.toISOString().slice(0,10);
}
function fmtDate(iso){
  if(!iso) return "—";
  const d=new Date(normalizeDate(iso));
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
}
function money(n,cur='€'){
  const v=Number(n||0);
  return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:2}).format(v)+' '+cur;
}
function initials(name=''){ return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase()||'?'; }
async function sha256(text){
  const data=new TextEncoder().encode(text);
  const buf=await crypto.subtle.digest('SHA-256',data);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// cache local sûr (fallback mémoire si localStorage bloqué — ex. preview)
const mem={};
const store={
  get(k){ try{const v=localStorage.getItem(CONFIG.CACHE_PREFIX+k);return v?JSON.parse(v):null;}catch(e){return mem[k]??null;} },
  set(k,v){ try{localStorage.setItem(CONFIG.CACHE_PREFIX+k,JSON.stringify(v));}catch(e){mem[k]=v;} },
  del(k){ try{localStorage.removeItem(CONFIG.CACHE_PREFIX+k);}catch(e){delete mem[k];} },
};

/* =========================================================================
   PERMISSIONS (RBAC)
   ------------------------------------------------------------------------- */
const ROLES={
  pdg:{label:'PDG',can:{all:true}},
  commerciale:{label:'Commerciale',can:{
    devisCreate:true, devisEditOwn:true, devisSend:true, devisDuplicate:true,
    patientCreate:true, factureCreate:true, viewOwnStats:true, pdf:true, paymentView:true,
    catalogManage:true,
  }},
  coordinatrice:{label:'Coordinatrice médicale',can:{
    devisViewAll:true, devisEditAll:true, patientViewAll:true, factureCreate:true,
    paymentEdit:true, scheduleEdit:true, pdf:true,
    catalogManage:true,
  }},
};
function can(user,perm){
  if(!user) return false;
  if(user.perms && Object.prototype.hasOwnProperty.call(user.perms,perm)) return !!user.perms[perm];
  const r=ROLES[user.role]; if(!r) return false;
  return r.can.all===true || !!r.can[perm];
}
function isAdmin(user){ return !!user && (user.role==='pdg' || can(user,'usersManage')); }
function userLabel(u){ if(!u) return '—'; const n=`${(u.prenom||'').trim()} ${(u.nom||'').trim()}`.trim(); return n||u.email||'—'; }
function fmtPhone(t){ if(!t) return ''; let d=(''+t).replace(/[^\d]/g,''); if(!d) return t;
  if(d.startsWith('0')) d=d.slice(1); if(d.startsWith('90')) d=d.slice(2);
  if(d.length===10) return '+90 '+d.replace(/(\d{3})(\d{3})(\d{2})(\d{2})/,'$1 $2 $3 $4');
  return (''+t).trim().startsWith('+')?(''+t).trim():'+'+d; }
function arrMove(arr,from,to){ const a=[...(arr||[])]; if(from<0||from>=a.length||to<0||to>=a.length) return a; const [x]=a.splice(from,1); a.splice(to,0,x); return a; }
function fmtDateTime(v){ if(!v) return '—'; const d=new Date(v); if(isNaN(d)) return '—';
  return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
// Redimensionne une image (photo de profil) en dataURL compacte
function resizeImage(file,max=160){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>{ const img=new Image(); img.onload=()=>{ const sc=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement('canvas'); c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',0.82)); };
    img.onerror=rej; img.src=r.result; }; r.onerror=rej; r.readAsDataURL(file); }); }

// Catalogue des permissions ajustables (libellés FR -> clés internes)

  {g:'Devis',items:[['devisCreate','Créer des devis'],['devisEditOwn','Modifier ses propres devis'],

];

   ------------------------------------------------------------------------- */

  company:"Clinic NobelWorld", tagline:"Tourisme médical · Istanbul",

  iban:"TR00 0000 0000 0000 0000 0000 00", bic:"XXXXXXXX", vat:"",

  docTitle:"DEVIS MÉDICAL PREMIUM",
  cgv:"Le présent devis est valable 30 jours. Un acompte confirme la réservation de la date opératoire. Le solde est réglé avant l'intervention. Les tarifs incluent uniquement les prestations listées.",
  important:"Le patient s'engage à fournir un bilan médical complet et à signaler tout traitement en cours. Les dates d'intervention sont confirmées après réception de l'acompte. En cas d'annulation à moins de 7 jours, l'acompte reste acquis. Les résultats peuvent varier d'un patient à l'autre ; aucun résultat n'est garanti. Un suivi post-opératoire est requis.",

const COLLECTIONS=['patients','devis','factures','paiements','modeles','options','historique','utilisateurs'];

async function localBootstrap(){
  if(!store.get('init')){
    store.set('parametres',DEFAULT_SETTINGS);
    store.set('modeles',SEED_MODELES);
    store.set('options',SEED_OPTIONS);
    store.set('utilisateurs',[]); // aucun utilisateur de démonstration — admin créé au 1er démarrage
    store.set('patients',[]); store.set('devis',[]); store.set('factures',[]);
    store.set('paiements',[]); store.set('historique',[]);
    store.set('seq',{devis:0,facture:0});
    store.set('init',true);
  }
  const data={parametres:store.get('parametres')||DEFAULT_SETTINGS};
  COLLECTIONS.forEach(c=>{ if(c!=='utilisateurs') data[c]=store.get(c)||[]; });
  data.utilisateurs=(store.get('utilisateurs')||[]).map(({pwd,salt,...u})=>u);
  return data;
}
function makeSalt(){ return Math.random().toString(36).slice(2,12)+Math.random().toString(36).slice(2,8); }
async function hashLocal(pwd,salt){ return sha256((salt||'')+':'+pwd); }
async function checkLocalPwd(u,pwd){ const h=await sha256((u.salt||'')+':'+pwd); if(u.salt) return h===u.pwd; return (await sha256(pwd))===u.pwd; }
async function remoteCall(action,payload){
  const res=await fetch(CONFIG.APPS_SCRIPT_URL,{
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action,...payload}),
  });
  const json=await res.json();
  if(!json.ok) throw new Error(json.error||'Erreur serveur');
  return json;
}

const API={
  remote(){ return !!CONFIG.APPS_SCRIPT_URL; },
  async login(email,password){
    if(API.remote()) return remoteCall('login',{email,password});
    await localBootstrap();
    const users=store.get('utilisateurs')||[];
    const u=users.find(x=>String(x.email).toLowerCase()===String(email).toLowerCase().trim());
    if(!u) throw new Error("Identifiant inconnu");
    if(u.statut==='desactive') throw new Error("Compte désactivé. Contactez l'administrateur.");
    const okPwd=await checkLocalPwd(u,password);
    if(!okPwd) throw new Error("Mot de passe incorrect");
    u.lastLogin=new Date().toISOString();
    store.set('utilisateurs',users.map(x=>x.id===u.id?u:x));
    const token='local-'+u.id;
    const {pwd,salt,...safe}=u;
    return {ok:true,token,user:safe};
  },
  async bootstrap(token){
    if(API.remote()) return remoteCall('bootstrap',{token});
    return {ok:true,...(await localBootstrap())};
  },
  async save(token,collection,record){
    if(API.remote()) return remoteCall('save',{token,collection,record});
    const list=store.get(collection)||[];
    let rec={...record};
    if(!rec.id){ rec.id=uid(collection.slice(0,3)); rec.createdAt=new Date().toISOString(); }
    rec.updatedAt=new Date().toISOString();
    const i=list.findIndex(x=>x.id===rec.id);
    if(i>=0) list[i]=rec; else list.push(rec);
    store.set(collection,list);
    return {ok:true,record:rec};
  },
  async remove(token,collection,id){
    if(API.remote()) return remoteCall('remove',{token,collection,id});
    const list=(store.get(collection)||[]).filter(x=>x.id!==id);
    store.set(collection,list); return {ok:true};
  },
  async nextNumber(token,type){
    if(API.remote()) return remoteCall('nextNumber',{token,type});
    const seq=store.get('seq')||{devis:0,facture:0};
    seq[type]=(seq[type]||0)+1; store.set('seq',seq);
    const p=type==='devis'?'D':'F';
    return {ok:true,numero:`${p}-${new Date().getFullYear()}-${String(seq[type]).padStart(6,'0')}`};
  },
  async setPassword(token,email,newPwd){
    if(API.remote()) return remoteCall('setPassword',{token,email,newPwd});
    const users=store.get('utilisateurs')||[];
    const u=users.find(x=>x.email===email); if(u){ u.salt=makeSalt(); u.pwd=await hashLocal(newPwd,u.salt); store.set('utilisateurs',users); }
    return {ok:true};
  },
  async authState(){
    if(API.remote()) return remoteCall('authState',{});
    await localBootstrap();
    return {ok:true, hasUsers:(store.get('utilisateurs')||[]).length>0};
  },
  async bootstrapAdmin(payload){
    if(API.remote()) return remoteCall('bootstrapAdmin',payload);
    await localBootstrap();
    const users=store.get('utilisateurs')||[];
    if(users.length>0) throw new Error('Configuration déjà effectuée');
    if(!payload.email||!payload.password) throw new Error('Email et mot de passe requis');
    const salt=makeSalt();
    const u={id:uid('u'),prenom:payload.prenom||'',nom:payload.nom||'',email:String(payload.email).toLowerCase().trim(),
      telephone:payload.telephone||'',fonction:payload.fonction||'Administrateur',role:'pdg',statut:'actif',
      photo:payload.photo||'',perms:{},salt,pwd:await hashLocal(payload.password,salt),
      createdAt:new Date().toISOString(),lastLogin:new Date().toISOString()};
    store.set('utilisateurs',[u]);
    const {pwd,salt:_s,...safe}=u;
    return {ok:true,token:'local-'+u.id,user:safe};
  },
  async userSave(token,payload){
    if(API.remote()) return remoteCall('userSave',{token,...payload});
    const users=store.get('utilisateurs')||[];
    const email=String(payload.email||'').toLowerCase().trim();
    if(!email) throw new Error('Email requis');
    if(users.some(x=>x.id!==payload.id && String(x.email).toLowerCase()===email)) throw new Error('Cet email est déjà utilisé');
    let u=users.find(x=>x.id===payload.id);
    if(!u){ u={id:uid('u'),createdAt:new Date().toISOString(),lastLogin:''}; users.push(u); }
    u.prenom=payload.prenom||''; u.nom=payload.nom||''; u.email=email; u.telephone=payload.telephone||'';
    u.fonction=payload.fonction||''; u.role=payload.role||'commerciale'; u.statut=payload.statut||'actif';
    u.photo=payload.photo||''; u.perms=payload.perms||{};
    if(payload.password){ u.salt=makeSalt(); u.pwd=await hashLocal(payload.password,u.salt); }
    if(!u.pwd) throw new Error('Mot de passe requis pour un nouvel utilisateur');
    store.set('utilisateurs',users);
    const {pwd,salt,...safe}=u;
    return {ok:true,user:safe};
  },
  async userDelete(token,id){
    if(API.remote()) return remoteCall('userDelete',{token,id});
    let users=store.get('utilisateurs')||[];
    users=users.filter(x=>x.id!==id);
    store.set('utilisateurs',users);
    return {ok:true};
  },
};

function patientName(p){ return p?`${p.prenom||''} ${p.nom||''}`.trim():'—'; }
function devisTotal(d){
  const lines=(d.lignes||[]).reduce((s,l)=>s+Number(l.qty||1)*Number(l.pu||0),0);
  const opts=(d.options||[]).reduce((s,o)=>s+Number(o.qty||1)*Number(o.prix||0),0);
  return lines+opts;
}
function paidFor(paiements,refId){ return (paiements||[]).filter(p=>p.refId===refId).reduce((s,p)=>s+Number(p.montant||0),0); }
function optsSum(r){ return (r.options||[]).reduce((s,o)=>s+Number(o.qty||1)*Number(o.prix||0),0); }
// total « affiché » : si un forfait est saisi, total = forfait + options ; sinon somme des lignes (anciens devis)
function totalOf(r){ const f=Number(r.forfait||0); return f>0 ? f+optsSum(r) : devisTotal(r); }

// ----- Paiements / factures -----
const PAY_MODES=['Espèces','Carte bancaire','Virement bancaire','Wise','Stripe','Revolut','Autre'];
function factPayments(paiements,refId){ return (paiements||[]).filter(p=>p.refId===refId).sort((a,b)=>(a.date||'').localeCompare(b.date||'')); }
function sumPays(list,kind){ return (list||[]).filter(p=> kind==='acompte'? p.type==='acompte' : p.type!=='acompte').reduce((s,p)=>s+Number(p.montant||0),0); }
function factureStatus(f,payments){
  if(f.statut==='annulee') return 'annulee';
  const tot=totalOf(f); const list=payments||[];
  const paid=list.reduce((s,p)=>s+Number(p.montant||0),0);
  if(tot>0 && paid>=tot) return 'payee';
  if(paid>0){ return list.some(p=>p.type!=='acompte')?'partielle':'acompte'; }
  return f.statut==='envoye'?'envoye':'brouillon';
}

function App(){
  const [session,setSession]=useState(()=>store.get('session'));
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [setup,setSetup]=useState(null); // null=inconnu, true=aucun admin, false=ok

  useEffect(()=>{ if(session){ setSetup(false); return; }
    let on=true; API.authState().then(r=>{ if(on) setSetup(!r.hasUsers); }).catch(()=>{ if(on) setSetup(false); });
    return()=>{on=false;}; },[session]);

  const refresh=useCallback(async(silent)=>{
    if(!session) return;
    try{ if(!silent) setLoading(true);
      const r=await API.bootstrap(session.token);
      setData({parametres:r.parametres||DEFAULT_SETTINGS,patients:r.patients||[],devis:r.devis||[],
        factures:r.factures||[],paiements:r.paiements||[],modeles:r.modeles||[],options:r.options||[],
        historique:r.historique||[],utilisateurs:r.utilisateurs||[]});
    }catch(e){ console.error(e);
      // Jeton refusé par le serveur (secret modifié, session expirée…) → on nettoie et on renvoie à la connexion
      if(/session/i.test(e&&e.message||'')){ store.del('session'); setSession(null); setData(null); }
    }
    finally{ if(!silent) setLoading(false); }
  },[session]);

  useEffect(()=>{ if(session) refresh(); },[session]);// eslint-disable-line
  useEffect(()=>{ if(!session) return; const t=setInterval(()=>refresh(true),CONFIG.POLL_MS); return()=>clearInterval(t);},[session,refresh]);

  const doLogin=async(email,password)=>{
    const r=await API.login(email,password);
    const s={token:r.token,user:r.user}; store.set('session',s); setSession(s);
  };
  const onAdminCreated=(s)=>{ store.set('session',s); setSession(s); setSetup(false); };
  const logout=()=>{ store.del('session'); setSession(null); setData(null); };

  if(!session){
    if(setup===null) return <ToastHost><div className="center-load"><span className="spin"></span></div></ToastHost>;
    if(setup===true) return <ToastHost><FirstRun onCreated={onAdminCreated}/></ToastHost>;
    return <ToastHost><Login onLogin={doLogin}/></ToastHost>;
  }
  if(!data) return <ToastHost><div className="center-load"><span className="spin"></span><span className="muted">Synchronisation…</span></div></ToastHost>;

  return <ToastHost><Shell session={session} data={data} setData={setData} refresh={refresh} logout={logout} loading={loading}/></ToastHost>;
}

  const navStack=useRef([{view:'dashboard',scroll:0}]);

  const ovSeq=useRef(0);

  const [confirmExit,setConfirmExit]=useState(false);

    setView(navStack.current[i].view); const y=navStack.current[i].scroll||0;

  const navGo=useCallback((v)=>{ if(!v) return;
    if(overlays.current.length){ overlays.current[overlays.current.length-1].close(); return; } // ferme la fenêtre ouverte d'abord (garde anti-perte)

    navStack.current[navPos.current].scroll=window.scrollY||0;      // mémorise le défilement quitté
    navStack.current=navStack.current.slice(0,navPos.current+1);
    navStack.current.push({view:v,scroll:0}); navPos.current=navStack.current.length-1;
    setView(v); try{history.pushState({cnw:true,i:navPos.current},'');}catch(e){}
    window.scrollTo(0,0); syncNavUI();
  },[]);// eslint-disable-line
  const navBack=useCallback(()=>{
    if(overlays.current.length){ overlays.current[overlays.current.length-1].close(); return; } // ferme la fenêtre ouverte d'abord
    if(navPos.current>0){ navStack.current[navPos.current].scroll=window.scrollY||0; try{history.back();}catch(e){ applyEntry(navPos.current-1); } }
    else setConfirmExit(true);                                       // déjà à l'accueil → proposer de quitter
  },[]);// eslint-disable-line
  const navFwd=useCallback(()=>{ if(overlays.current.length) return;
    if(navPos.current<navStack.current.length-1){ try{history.forward();}catch(e){ applyEntry(navPos.current+1); } }
  },[]);// eslint-disable-line
  useEffect(()=>{ try{history.replaceState({cnw:true,i:0},'');}catch(e){}
    const onPop=(e)=>{
      if(overlays.current.length){ overlays.current[overlays.current.length-1].close();
        try{history.pushState({cnw:true,i:navPos.current},'');}catch(err){} return; }
      const st=e.state;
      if(st&&st.cnw&&typeof st.i==='number') applyEntry(st.i);
      else { try{history.pushState({cnw:true,i:navPos.current},'');}catch(err){} setConfirmExit(true); }
    };
    window.addEventListener('popstate',onPop); return ()=>window.removeEventListener('popstate',onPop);
  },[]);// eslint-disable-line
  useEffect(()=>{ const h=(e)=>{ if(!e.altKey) return;
      if(e.key==='ArrowLeft'){ e.preventDefault(); navBack(); }
      else if(e.key==='ArrowRight'){ e.preventDefault(); navFwd(); } };
    window.addEventListener('keydown',h); return()=>window.removeEventListener('keydown',h);
  },[navBack,navFwd]);

  // actions partagées
  const ctx={
    user,data,toast,
    async save(collection,record,logMsg){
      const r=await API.save(session.token,collection,record);
      setData(d=>{ const list=d[collection]||[]; const i=list.findIndex(x=>x.id===r.record.id);
        const nl=i>=0?list.map(x=>x.id===r.record.id?r.record:x):[...list,r.record];
        return {...d,[collection]:nl}; });
      if(logMsg) ctx.log(logMsg);
      return r.record;
    },
    async remove(collection,id,logMsg){
      await API.remove(session.token,collection,id);
      setData(d=>({...d,[collection]:(d[collection]||[]).filter(x=>x.id!==id)}));
      if(logMsg) ctx.log(logMsg);
    },
    async nextNumber(type){ const r=await API.nextNumber(session.token,type); return r.numero; },
    async saveUser(payload){
      const r=await API.userSave(session.token,payload);
      setData(d=>{ const list=d.utilisateurs||[]; const i=list.findIndex(x=>x.id===r.user.id);
        const nl=i>=0?list.map(x=>x.id===r.user.id?r.user:x):[...list,r.user];
        return {...d,utilisateurs:nl}; });
      return r.user;
    },
    async removeUser(id){
      await API.userDelete(session.token,id);
      setData(d=>({...d,utilisateurs:(d.utilisateurs||[]).filter(x=>x.id!==id)}));
    },
    async resetPassword(email,newPwd){ await API.setPassword(session.token,email,newPwd); },
    async saveSettings(s){
      if(API.remote()) await remoteCall('saveSettings',{token:session.token,parametres:s});
      else store.set('parametres',s);
      setData(d=>({...d,parametres:s}));
    },
    async log(message){
      const entry={id:uid('h'),date:new Date().toISOString(),user:userLabel(user),message};
      const r=await API.save(session.token,'historique',entry).catch(()=>({record:entry}));
      setData(d=>({...d,historique:[r.record,...(d.historique||[])].slice(0,500)}));
    },
    go:navGo,
    registerOverlay(close){ const id=++ovSeq.current; overlays.current.push({id,close}); return id; },
    unregisterOverlay(id){ overlays.current=overlays.current.filter(o=>o.id!==id); },
  };

  const Views={dashboard:Dashboard,devis:DevisView,factures:FacturesView,paiements:PaiementsView,
    patients:PatientsView,modeles:ModelesView,options:OptionsView,historique:HistoriqueView,parametres:ParametresView,
    utilisateurs:UtilisateursView};
  const Current=Views[view]||Dashboard;
  const title=(NAV.find(n=>n.k===view)||{}).label||'Tableau de bord';
  const navItems=NAV.filter(n=>!n.adminOnly||isAdmin(user));

  return <AppCtx.Provider value={ctx}>
    <div className="app">
      <div className={"scrim "+(navOpen?'show':'')} onClick={()=>setNavOpen(false)}/>
      <aside className={"sidebar "+(navOpen?'open':'')}>
        <div className="brand"><div className="mark">N</div>
          <div><div className="name">Clinic NobelWorld</div><div className="sub">Devis &amp; Factures</div></div></div>
        {navItems.map((n,i)=> n.sec
          ? <div key={i} className="nav-section">{n.sec}</div>
          : <button key={n.k} className={"nav-item "+(view===n.k?'active':'')} onClick={()=>{navGo(n.k);setNavOpen(false);}}>
              <n.icon size={18} className="ic"/>{n.label}</button>)}
        <div className="nav-spacer"/>
        <div className="nav-user">{user.photo? <img className="av" src={user.photo} alt="" style={{objectFit:'cover'}}/> : <div className="av">{initials(userLabel(user))}</div>}
          <div style={{flex:1,minWidth:0}}><div className="nm">{userLabel(user)}</div><div className="rl">{ROLES[user.role]?.label||user.fonction||''}</div></div>
          <button className="btn btn-ghost btn-sm" style={{color:'#aebed1'}} title="Déconnexion" onClick={logout}><Ico.arrow size={16}/></button></div>
      </aside>
      <div className="main">
        <div className="topbar">
          <button className="menu-btn" onClick={()=>setNavOpen(true)}><Ico.menu size={20}/></button>
          <button className="btn btn-ghost btn-sm nav-arrow" title="Retour (Alt+←)" onClick={navBack}><Ico.chevron size={18} style={{transform:'rotate(180deg)'}}/></button>
          <button className="btn btn-ghost btn-sm nav-arrow" disabled={!navUI.fwd} title="Suivant (Alt+→)" onClick={navFwd}><Ico.chevron size={18}/></button>
          <h1>{title}</h1>
          <div className="search"><Ico.search size={16} className="ic"/>
            <input placeholder="Rechercher patient, devis, facture…" value={q} onChange={e=>setQ(e.target.value)}/></div>
          {loading&&<span className="spin"/>}
          <button className="btn btn-ghost btn-sm" title="Actualiser" onClick={()=>refresh()}><Ico.hist size={16}/></button>
        </div>
        <div className="content">
          {q.trim()? <SearchResults q={q} onClear={()=>setQ('')}/> : <Current/>}
        </div>
      </div>
    </div>
    {confirmExit&&<Modal small title="Quitter Clinic NobelWorld ?" onClose={()=>setConfirmExit(false)} footer={<>
      <button className="btn" onClick={()=>setConfirmExit(false)}>Annuler</button>
      <button className="btn btn-danger" onClick={()=>{ setConfirmExit(false); try{history.back();}catch(e){} }}>Quitter</button>
    </>}><p className="muted" style={{margin:0,lineHeight:1.6}}>Vous êtes sur la page d'accueil. Voulez-vous quitter l'application&nbsp;?</p></Modal>}
  </AppCtx.Provider>;
}

function Kpi({label,value,sub,icon,tone}){
  const Ic=icon;
  return <div className={"kpi "+(tone||'')}><span className="edge"/>
    <div className="lab">{Ic&&<Ic size={15}/>}{label}</div>
    <div className="val tnum">{value}</div>{sub&&<div className="sub">{sub}</div>}</div>;
}
function Dashboard(){
  const {data,user,go}=useApp();
  const cur=data.parametres.currency||'€';
  const myDevis = user.role==='commerciale' ? data.devis.filter(d=>d.createdBy===user.id) : data.devis;
  const totalDevis=myDevis.reduce((s,d)=>s+totalOf(d),0);
  const encaisse=data.paiements.reduce((s,p)=>s+Number(p.montant||0),0);
  const factTotal=data.factures.reduce((s,f)=>s+totalOf(f),0);
  const restant=Math.max(0,factTotal-encaisse);
  const enAttente=data.devis.filter(d=>['brouillon','envoye'].includes(d.statut)).length;
  const payees=data.factures.filter(f=>f.statut==='payee').length;
  // graphique mensuel (montant devis sur 6 mois)
  const months=[...Array(6)].map((_,i)=>{ const d=new Date(); d.setMonth(d.getMonth()-(5-i)); return {key:d.toISOString().slice(0,7),label:d.toLocaleDateString('fr-FR',{month:'short'})}; });
  const series=months.map(m=>({...m,val:myDevis.filter(d=>(normalizeDate(d.date)||'').slice(0,7)===m.key).reduce((s,d)=>s+totalOf(d),0)}));
  const maxV=Math.max(1,...series.map(s=>s.val));
  const recents=[...myDevis].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,6);

  return <>
    <div className="grid kpis" style={{marginBottom:18}}>
      <Kpi label="Devis" value={myDevis.length} sub={money(totalDevis,cur)+' au total'} icon={Ico.doc}/>
      <Kpi label="Factures" value={data.factures.length} sub={payees+' payée(s)'} icon={Ico.invoice} tone="gold"/>
      <Kpi label="Encaissé" value={money(encaisse,cur)} sub={data.paiements.length+' paiement(s)'} icon={Ico.wallet} tone="ok"/>
      <Kpi label="Restant dû" value={money(restant,cur)} sub="sur factures émises" icon={Ico.euro} tone="warn"/>
      <Kpi label="Patients" value={data.patients.length} icon={Ico.patient}/>
      <Kpi label="Devis en attente" value={enAttente} sub="brouillon / envoyé" icon={Ico.bell}/>
    </div>
    <div className="grid" style={{gridTemplateColumns:'1.4fr 1fr',alignItems:'start'}}>
      <div className="card card-pad">
        <div className="sec-head"><div><h2>Volume des devis</h2><div className="desc">6 derniers mois</div></div></div>
        <div className="bars">{series.map(s=>(
          <div key={s.key} className="bcol"><div style={{flex:1,width:'100%',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
            <div className="b" style={{height:Math.round((s.val/maxV)*100)+'%'}} title={money(s.val,cur)}/></div>
            <div className="bl">{s.label}</div></div>))}</div>
      </div>
      <div className="card card-pad">
        <div className="sec-head"><div><h2>Derniers devis</h2></div>
          <button className="btn btn-sm" onClick={()=>go('devis')}>Tout voir</button></div>
        {recents.length? recents.map(d=>{ const p=data.patients.find(x=>x.id===d.patientId);
          return <div key={d.id} className="clickable" onClick={()=>go('devis')}
            style={{display:'flex',alignItems:'center',gap:12,padding:'10px 4px',borderBottom:'1px solid var(--surface-2)',cursor:'pointer'}}>
            <div className="av" style={{width:30,height:30,borderRadius:8,background:'var(--surface-2)',color:'var(--blue)',display:'grid',placeItems:'center',fontSize:11,fontWeight:700}}>{initials(patientName(p))}</div>
            <div style={{flex:1,minWidth:0}}><div className="t-strong" style={{fontSize:13}}>{d.numero}</div>
              <div className="muted" style={{fontSize:12}}>{patientName(p)}</div></div>
            <div style={{textAlign:'right'}}><div className="t-strong tnum">{money(totalOf(d),cur)}</div>
              <div style={{fontSize:11}}><StatusBadge s={d.statut}/></div></div>
          </div>; }) : <Empty title="Aucun devis" sub="Créez votre premier devis."/>}
      </div>
    </div>
  </>;
}

function DocumentView({record,type,onClose,list,onChange}){
  const {data}=useApp(); const s=data.parametres;
  const isF=type==='facture';
  // Navigation dans l'ordre exact de la liste affichée (filtres/recherche conservés)
  const items=(Array.isArray(list)&&list.length)?list:[record];
  const idx=Math.max(0,items.findIndex(x=>x.id===record.id));
  const rec=items[idx]||record;            // données à jour même après un rafraîchissement
  const canPrev=idx>0, canNext=idx<items.length-1;
  const goTo=(i)=>{ if(!onChange||i<0||i>=items.length) return; onChange(items[i]); };
  const p=data.patients.find(x=>x.id===rec.patientId)||{};
  const paid=isF? paidFor(data.paiements,rec.id) : Number(rec.acompte||0);
  // Raccourcis clavier ← / → (ignorés quand on tape dans un champ)
  useEffect(()=>{
    const h=(e)=>{ const t=e.target||{}; const tag=(t.tagName||'').toLowerCase();
      if(tag==='input'||tag==='textarea'||tag==='select'||t.isContentEditable) return;
      if(e.key==='ArrowLeft'&&canPrev){ e.preventDefault(); goTo(idx-1); }
      else if(e.key==='ArrowRight'&&canNext){ e.preventDefault(); goTo(idx+1); }
    };
    window.addEventListener('keydown',h); return()=>window.removeEventListener('keydown',h);
  },[idx,items,canPrev,canNext]);// eslint-disable-line
  // Impression / PDF multi-pages : on clone le document directement sous <body>
  // pour laisser le navigateur paginer normalement (sans troncature en position absolue).
  React.useEffect(()=>{
    const onBefore=()=>{
      if(document.getElementById('print-clone')) return;
      const src=document.getElementById('print-area'); if(!src) return;
      const clone=src.cloneNode(true); clone.id='print-clone';
      document.body.appendChild(clone); document.body.classList.add('printing');
    };
    const onAfter=()=>{ document.body.classList.remove('printing');
      const c=document.getElementById('print-clone'); if(c) c.remove(); };
    window.addEventListener('beforeprint',onBefore);
    window.addEventListener('afterprint',onAfter);
    return ()=>{ window.removeEventListener('beforeprint',onBefore); window.removeEventListener('afterprint',onAfter); onAfter(); };
  },[]);
  const doPrint=()=>{ setTimeout(()=>window.print(),30); };
  const label=isF?'Facture':'Devis';
  return <Drawer wide title={label+' '+(rec.numero||'')} onClose={onClose}
    footer={<>
      <div className="docnav">
        <button className="btn btn-sm" disabled={!canPrev} onClick={()=>goTo(idx-1)} title="Précédent (←)"><Ico.chevron size={16} style={{transform:'rotate(180deg)'}}/></button>
        <span className="docnav-c">{label} {idx+1} / {items.length}</span>
        <button className="btn btn-sm" disabled={!canNext} onClick={()=>goTo(idx+1)} title="Suivant (→)"><Ico.chevron size={16}/></button>
      </div>
      <button className="btn" onClick={onClose}>Fermer</button>
      <button className="btn btn-primary" onClick={doPrint}><Ico.print size={16}/>Imprimer / PDF</button></>}>
    <div id="print-area"><DevisDoc record={rec} settings={s} patient={p} type={type} paid={paid} editable={false}/></div>
  </Drawer>;
}

function DevisView(){
  const {data,user,save,remove,nextNumber,toast,go}=useApp();
  const [editor,setEditor]=useState(null);   // {} ou devis existant
  const [viewDoc,setViewDoc]=useState(null);
  const [del,setDel]=useState(null);
  const [filter,setFilter]=useState('tous');
  let list=user.role==='commerciale'? data.devis.filter(d=>d.createdBy===user.id): data.devis;
  if(filter!=='tous') list=list.filter(d=>d.statut===filter);
  list=[...list].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  const cur=data.parametres.currency||'€';

  const duplicate=async(d)=>{
    const numero=await nextNumber('devis');
    const copy={...d}; delete copy.id; delete copy.createdAt; delete copy.updatedAt;
    await save('devis',{...copy,numero,statut:'brouillon',createdBy:user.id},`a dupliqué un devis → ${numero}`);
    toast('Devis dupliqué : '+numero);
  };
  const convert=async(d)=>{
    const numero=await nextNumber('facture');
    const fac={...d,id:undefined,numeroDevis:d.numero,numero,statut:'brouillon',devisId:d.id,createdBy:user.id};
    delete fac.createdAt; delete fac.updatedAt;
    await save('factures',fac,`a transformé ${d.numero} en facture ${numero}`);
    await save('devis',{...d,statut:'accepte'});
    toast('Facture créée : '+numero); go('factures');
  };

  return <>
    <div className="toolbar"><div className="sec-head" style={{margin:0}}><div><h2>Devis</h2>
      <div className="desc">{list.length} devis</div></div></div><div className="sp"/>
      <div className="seg">{['tous','brouillon','envoye','accepte'].map(k=>(
        <button key={k} className={filter===k?'on':''} onClick={()=>setFilter(k)}>{k==='tous'?'Tous':({brouillon:'Brouillons',envoye:'Envoyés',accepte:'Acceptés'})[k]}</button>))}</div>
      {can(user,'devisCreate')&&<button className="btn btn-primary" onClick={()=>setEditor({})}><Ico.plus size={16}/>Nouveau devis</button>}</div>
    <div className="card">{list.length? <table>
      <thead><tr><th>N°</th><th>Patient</th><th>Date</th><th>Intervention</th><th>Statut</th><th className="r" style={{textAlign:'right'}}>Total</th><th></th></tr></thead>
      <tbody>{list.map(d=>{ const p=data.patients.find(x=>x.id===d.patientId);
        const mine=d.createdBy===user.id; const canEdit=can(user,'devisEditAll')||can(user,'all')||(can(user,'devisEditOwn')&&mine);
        return <tr key={d.id} className="clickable" onClick={()=>setViewDoc(d)}>
          <td className="t-strong">{d.numero}</td><td>{patientName(p)}</td><td className="muted">{fmtDate(d.date)}</td>
          <td className="muted">{d.dateIntervention?fmtDate(d.dateIntervention):'—'}</td>
          <td><StatusBadge s={d.statut}/></td><td className="tnum t-strong" style={{textAlign:'right'}}>{money(totalOf(d),cur)}</td>
          <td onClick={e=>e.stopPropagation()} style={{textAlign:'right',whiteSpace:'nowrap'}}>
            {canEdit&&<button className="btn btn-ghost btn-sm" title="Modifier" onClick={()=>setEditor(d)}><Ico.edit size={15}/></button>}
            {can(user,'devisDuplicate')||can(user,'all')? <button className="btn btn-ghost btn-sm" title="Dupliquer" onClick={()=>duplicate(d)}><Ico.copy size={15}/></button>:null}
            {(can(user,'factureCreate')||can(user,'all'))&&<button className="btn btn-ghost btn-sm" title="→ Facture" onClick={()=>convert(d)}><Ico.invoice size={15}/></button>}
            {can(user,'all')&&<button className="btn btn-ghost btn-sm btn-danger" title="Supprimer" onClick={()=>setDel(d)}><Ico.trash size={15}/></button>}
          </td></tr>;})}</tbody></table>
      : <Empty icon={Ico.doc} title="Aucun devis" sub="Créez un devis premium en quelques clics."
          action={can(user,'devisCreate')&&<button className="btn btn-primary" onClick={()=>setEditor({})}><Ico.plus size={16}/>Nouveau devis</button>}/>}</div>
    {editor&&<DevisEditor devis={editor} list={list} onClose={()=>setEditor(null)} onPreview={(d)=>setViewDoc(d)}/>}
    {viewDoc&&<DocumentView record={viewDoc} type="devis" list={list} onChange={setViewDoc} onClose={()=>setViewDoc(null)}/>}
    {del&&<Confirm danger title="Supprimer le devis" message={`Supprimer ${del.numero} ?`} yes="Supprimer"
      onClose={()=>setDel(null)} onYes={async()=>{ await remove('devis',del.id,`a supprimé le devis ${del.numero}`); toast('Devis supprimé','err'); }}/>}
  </>;
}
/* =========================================================================
   ÉDITEUR DE DEVIS (WYSIWYG — page A4 éditable au clic)
   ------------------------------------------------------------------------- */
function DevisEditor({devis,onClose,onPreview,list}){
  const {data,user,save,nextNumber,toast}=useApp();
  const cur=data.parametres.currency||'€';
  const [quickPatient,setQuickPatient]=useState(false);
  const [dirty,setDirty]=useState(false); const dmounted=useRef(false);
  const [curDevis,setCurDevis]=useState(devis);   // devis en cours d'édition (change via ‹ ›)
  const isEdit=!!curDevis.id;
  // Construit l'état du formulaire à partir d'un devis (réutilisé lors de la navigation)
  const buildForm=(d)=>{
    const base={
      patientId:'',date:todayISO(),validite:addDays(todayISO(),30),dateIntervention:'',
      chirurgien:'',hopital:data.parametres.address||'',modeleId:'',
      actes:[],inc:[...DEFAULT_INC],exc:[],options:[],importantList:[...DEFAULT_IMPORTANT],
      paiementNote:DEFAULT_PAIEMENT_NOTE,forfait:0,acompte:0,statut:'brouillon',...d,
    };
    if(d.id){ // compat anciens devis (lignes) → actes
      if((!base.actes||!base.actes.length)&&d.lignes&&d.lignes.length){
        base.actes=d.lignes.map(l=>({id:uid('a'),acte:l.desc,inclus:''}));
        if(!Number(base.forfait)) base.forfait=devisTotal(d);
      }
      if((!base.importantList||!base.importantList.length)&&d.important) base.importantList=[d.important];
    }
    if(!base.actes||!base.actes.length) base.actes=[{id:uid('a'),acte:'',inclus:''}];
    return base;
  };
  const [f,setF]=useState(()=>buildForm(devis));

  // Marque le devis comme modifié dès qu'un champ change (sauf au montage / après un chargement)
  useEffect(()=>{ if(dmounted.current) setDirty(true); else dmounted.current=true; },[f]);// eslint-disable-line

  // ---- Navigation entre devis, dans l'ordre exact de la liste affichée ----
  const items=(Array.isArray(list)&&list.length)?list:[];
  const idx=items.findIndex(x=>x.id===curDevis.id);
  const showNav=idx>=0;
  const canPrev=idx>0, canNext=idx>=0&&idx<items.length-1;
  const [pendingNav,setPendingNav]=useState(null);
  const loadDevis=(d)=>{ dmounted.current=false; setCurDevis(d); setF(buildForm(d)); setDirty(false); };
  const navTo=(d)=>{ if(!d) return; if(dirty) setPendingNav(d); else loadDevis(d); };
  const goPrev=()=>{ if(canPrev) navTo(items[idx-1]); };
  const goNext=()=>{ if(canNext) navTo(items[idx+1]); };
  // Raccourcis clavier ← / → (ignorés pendant la saisie ou si une boîte est ouverte)
  useEffect(()=>{
    const h=(e)=>{ const t=e.target||{}; const tag=(t.tagName||'').toLowerCase();
      if(tag==='input'||tag==='textarea'||tag==='select'||t.isContentEditable) return;
      if(pendingNav||quickPatient) return;
      if(e.key==='ArrowLeft'&&canPrev){ e.preventDefault(); goPrev(); }
      else if(e.key==='ArrowRight'&&canNext){ e.preventDefault(); goNext(); }
    };
    window.addEventListener('keydown',h); return()=>window.removeEventListener('keydown',h);
  },[idx,items,canPrev,canNext,dirty,pendingNav,quickPatient]);// eslint-disable-line

  const closeGuard=()=>{ if(dirty && !window.confirm('Des modifications ne sont pas sauvegardées. Voulez-vous continuer ?')) return; onClose(); };
  useNavOverlay(closeGuard);

  const on={
    editable:true, patients:data.patients, paiements:data.paiements,
    set:(k,v)=>setF(s=>({...s,[k]:v})),
    addActe:()=>setF(s=>({...s,actes:[...(s.actes||[]),{id:uid('a'),acte:'',inclus:''}]})),
    setActe:(id,k,v)=>setF(s=>({...s,actes:(s.actes||[]).map(a=>a.id===id?{...a,[k]:v}:a)})),
    rmActe:(id)=>setF(s=>({...s,actes:(s.actes||[]).filter(a=>a.id!==id)})),
    addInc:()=>setF(s=>({...s,inc:[...(s.inc||[]),'']})),
    setInc:(i,v)=>setF(s=>({...s,inc:(s.inc||[]).map((x,j)=>j===i?v:x)})),
    rmInc:(i)=>setF(s=>({...s,inc:(s.inc||[]).filter((_,j)=>j!==i)})),
    moveInc:(from,to)=>setF(s=>({...s,inc:arrMove(s.inc,from,to)})),
    addExc:()=>setF(s=>({...s,exc:[...(s.exc||[]),'']})),
    setExc:(i,v)=>setF(s=>({...s,exc:(s.exc||[]).map((x,j)=>j===i?v:x)})),
    rmExc:(i)=>setF(s=>({...s,exc:(s.exc||[]).filter((_,j)=>j!==i)})),
    moveExc:(from,to)=>setF(s=>({...s,exc:arrMove(s.exc,from,to)})),
    addOpt:()=>setF(s=>({...s,options:[...(s.options||[]),{nom:'',qty:1,prix:0}]})),
    setOpt:(i,k,v)=>setF(s=>({...s,options:(s.options||[]).map((o,j)=>j===i?{...o,[k]:v}:o)})),
    rmOpt:(i)=>setF(s=>({...s,options:(s.options||[]).filter((_,j)=>j!==i)})),
    addImp:()=>setF(s=>({...s,importantList:[...(s.importantList||[]),'']})),
    setImp:(i,v)=>setF(s=>({...s,importantList:(s.importantList||[]).map((x,j)=>j===i?v:x)})),
    rmImp:(i)=>setF(s=>({...s,importantList:(s.importantList||[]).filter((_,j)=>j!==i)})),
  };

  const applyModele=(id)=>{ const m=data.modeles.find(x=>x.id===id); if(!m) return;
    setF(s=>({...s,modeleId:id,
      actes:[...(s.actes||[]).filter(a=>a.acte||a.inclus),{id:uid('a'),acte:m.nom,inclus:m.description||''}],
      inc:(m.inc&&m.inc.length)?[...m.inc]:(s.inc||[]),
      exc:(m.exc&&m.exc.length)?[...m.exc]:(s.exc||[]),
      forfait:Number(s.forfait)||m.prixBase}));
    toast('Modèle appliqué : '+m.nom); };

  const total=totalOf(f); const reste=Math.max(0,total-Number(f.acompte||0));

  const persist=async(statut)=>{
    let payload={...f,statut:statut||f.statut||'brouillon'};
    if(!payload.numero) payload.numero=await nextNumber('devis');
    if(!isEdit) payload.createdBy=user.id;
    const saved=await save('devis',payload,`${isEdit?'a modifié':'a créé'} le devis ${payload.numero}`);
    setDirty(false);
    return saved||payload;
  };
  const finish=async(statut,preview)=>{
    const saved=await persist(statut);
    toast(isEdit?'Devis mis à jour':'Devis créé : '+saved.numero);
    onClose(); if(preview&&onPreview) onPreview(saved);
  };

  return <div className="editor-overlay">
    <div className="editor">
      <div className="editor-top">
        <button className="btn btn-ghost btn-sm" onClick={closeGuard}><Ico.x size={18}/></button>
        <h3>{isEdit?'Modifier '+(curDevis.numero||'le devis'):'Nouveau devis'}</h3>
        {showNav&&<div className="editor-nav">
          <button className="btn btn-sm" disabled={!canPrev} onClick={goPrev} title="Devis précédent (←)"><Ico.chevron size={16} style={{transform:'rotate(180deg)'}}/></button>
          <span className="editor-nav-c">Devis {idx+1} / {items.length}</span>
          <button className="btn btn-sm" disabled={!canNext} onClick={goNext} title="Devis suivant (→)"><Ico.chevron size={16}/></button>
        </div>}
        <button className="btn" onClick={()=>finish(null,true)}><Ico.print size={15}/>Aperçu / PDF</button>
        <button className="btn btn-primary" onClick={()=>finish(f.statut,false)}><Ico.check size={16}/>Enregistrer</button>
      </div>
      <div className="editor-main">
        <div className="editor-doc">
          <DevisDoc record={f} settings={data.parametres} patient={data.patients.find(p=>p.id===f.patientId)}
            type="devis" paid={Number(f.acompte||0)} editable on={on}/>
        </div>

function ListEditor({label,items,onChange,ph}){

  return <Field label={label}>

function FactureDetail({facture,onClose}){

      <Kpi label="Total paiements" value={money(totPa,cur)} icon={Ico.pay}/>

function PaymentEditor({facture,payment,type,reste,onClose}){
  const {data,save,toast}=useApp(); const cur=data.parametres.currency||'€';
  const isEdit=!!(payment&&payment.id);
  const [f,setF]=useState(()=>({
    type:(payment&&payment.type)||type||'paiement',
    montant: payment? payment.montant : (type==='acompte'?'':(reste||'')),
    date:(payment&&payment.date)||todayISO(),
    mode:(payment&&payment.mode)||'Virement bancaire',
  }));
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const label=f.type==='acompte'?'acompte':'paiement';
  const submit=async()=>{
    const rec={...(payment||{}),refId:facture.id,refNum:facture.numero,type:f.type,montant:Number(f.montant),date:f.date,mode:f.mode};
    await save('paiements',rec,`${isEdit?'a modifié':'a ajouté'} un ${label} de ${money(Number(f.montant),cur)} sur ${facture.numero}`);
    toast(isEdit?'Mouvement modifié':'Mouvement ajouté'); onClose();
  };
  return <Modal small title={(isEdit?'Modifier ':'Ajouter ')+(f.type==='acompte'?'un acompte':'un paiement')} onClose={onClose}
    footer={<><button className="btn" onClick={onClose}>Annuler</button>
      <button className="btn btn-primary" disabled={!(Number(f.montant)>0)} onClick={submit}><Ico.check size={16}/>{isEdit?'Enregistrer':'Ajouter'}</button></>}>
    <Field label="Type"><Select value={f.type} onChange={e=>set('type',e.target.value)}>
      <option value="acompte">Acompte</option><option value="paiement">Paiement</option></Select></Field>
    <div className="row2">
      <Field label="Montant" hint={cur}><Input type="number" value={f.montant} onChange={e=>set('montant',e.target.value)}/></Field>
      <Field label="Date"><Input type="date" value={f.date} onChange={e=>set('date',e.target.value)}/></Field></div>
    <Field label="Mode de paiement"><Select value={f.mode} onChange={e=>set('mode',e.target.value)}>
      {PAY_MODES.map(m=><option key={m}>{m}</option>)}</Select></Field>
  </Modal>;
}

function PaymentLineEditor({payment,onClose}){
  const {data,save,toast}=useApp(); const cur=data.parametres.currency||'€';

  const [f,setF]=useState(()=>({
    refId:payment.refId||'', type:payment.type||'paiement',
    montant:payment.montant!=null?payment.montant:'', date:normalizeDate(payment.date)||todayISO(),
    mode:payment.mode||'Virement bancaire', note:payment.note||'',

  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const submit=async()=>{
    const fac=data.factures.find(x=>x.id===f.refId);
    const rec={...payment,refId:f.refId,refNum:fac?fac.numero:(f.refId?payment.refNum:''),
      type:f.type,montant:Number(f.montant),date:f.date,mode:f.mode,note:f.note};

    footer={<><button className="btn" onClick={onClose}>Annuler</button>

    <Field label="Mode de paiement"><Select value={f.mode} onChange={e=>set('mode',e.target.value)}>
